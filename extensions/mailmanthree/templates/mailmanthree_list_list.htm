<div class='page-header'>
	<h1><tmpl_var name="list_head_txt"></h1>
</div>

        <p class="fieldset-legend">{tmpl_var name="toolsarea_head_txt"}</p>

                <button class="btn btn-default formbutton-success" type="button" data-load-content="mail/mailmanthree_list_edit.php">{tmpl_var name="add_new_record_txt"}</button>
                <button class="btn btn-default formbutton-default" type="button" data-load-content="mail/mailmanthree_sync_now.php"><span class="icon icon-refresh"></span> {tmpl_var name="btn_sync_txt"}</button>




        <p class="fieldset-legend"><tmpl_var name="list_head_txt"></p>
            <div class="table-wrapper marginTop15">
<table class="table">
                <thead class="dark form-group-sm">
                    <tr>
                        <th data-column="list_name"><tmpl_var name="list_name_txt"></th>
                        <th data-column="domain"><tmpl_var name="domain_txt"></th>
                        <th data-column="member_count"><tmpl_var name="member_count_txt"></th>
                        <th data-column="active"><tmpl_var name="active_txt"></th>
                        <th class="small-col text-right">{tmpl_var name='search_limit'}</th>
                    </tr>
                    <tr>
                        <td><input class="form-control" type="text" name="search_list_name" value="{tmpl_var name='search_list_name'}" /></td>
                        <td><input class="form-control" type="text" name="search_domain" value="{tmpl_var name='search_domain'}" /></td>
                        <td><input class="form-control" type="text" name="search_member_count" value="{tmpl_var name='search_member_count'}" /></td>
                        <td><select class="form-control" name="search_active">{tmpl_var name='search_active'}</select></td>
                        <td class="text-right">
                            <button type="button" class="btn btn-default formbutton-default formbutton-narrow" name="Filter" id="Filter" value="{tmpl_var name="filter_txt"}" data-submit-form="pageForm" data-form-action="mail/mailmanthree_list_list.php"><span class="icon icon-filter"></span></button>
                        </td>
                    </tr>
                </thead>
                <tbody>
                    <tmpl_loop name="records">
                        <tr>
                            <td><a href="#" data-load-content="mail/mailmanthree_list_edit.php?id={tmpl_var name='id'}">{tmpl_var name="list_name"}</a></td>
                            <td><a href="#" data-load-content="mail/mailmanthree_list_edit.php?id={tmpl_var name='id'}">{tmpl_var name="domain"}</a></td>
                            <td>{tmpl_var name="member_count"}</td>
                            <td>{tmpl_var name="active"}</td>
                            <td class="text-right">
                                <a class="btn btn-default formbutton-danger formbutton-narrow" href="javascript: ISPConfig.confirm_action('mail/mailmanthree_list_del.php?id={tmpl_var name='id'}&_csrf_id={tmpl_var name='csrf_id'}&_csrf_key={tmpl_var name='csrf_key'}&phpsessid={tmpl_var name='phpsessid'}','{tmpl_var name='delete_confirmation'}');"><span class="icon icon-delete"></span></a>
                            </td>
                        </tr>
                    </tmpl_loop>
                    <tmpl_unless name="records">
                        <tr class="tbl_row_noresults tbl_row_<tmpl_if name='__EVEN__'}even<tmpl_else>uneven</tmpl_if>">
                            <td colspan="5">{tmpl_var name='globalsearch_noresults_text_txt'}</td>
                        </tr>
                    </tmpl_unless>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="5"><tmpl_var name="paging"></td>
                    </tr>
                </tfoot>
            </table>
</div>
